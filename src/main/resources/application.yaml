spring:
  application:
    name: chokchok
  datasource:
    # 기본값은 로컬 docker compose 기준. compose/배포는 DB_* 환경변수로 덮어씀
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chokchok}?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USER:chokchok}
    password: ${DB_PASSWORD:chokchok}
  jpa:
    hibernate:
      # DDL 소유는 schema.sql(단독). Hibernate는 엔티티↔테이블 정합만 검증
      ddl-auto: validate
    open-in-view: false

# CORS 허용 origin (SecurityConfig). 배포 도메인 확정 시 콤마로 추가: "http://localhost:5173,https://chok.example.com"
app:
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173}
  # JWT 로그인. secret은 HS256 → 최소 32바이트. 기본값 없음(fail-closed) — 모든 실행 경로에서 JWT_SECRET 필수.
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:60}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
