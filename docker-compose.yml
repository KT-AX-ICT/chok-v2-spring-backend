services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-chokchok}
      MYSQL_USER: ${DB_USER:-chokchok}
      MYSQL_PASSWORD: ${DB_PASSWORD:-chokchok}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      TZ: UTC
    # 스키마는 UTC 고정(schema.sql) — 서버 타임존도 UTC로 맞춤
    command: --default-time-zone=+00:00
    ports:
      # 호스트 3306은 로컬 MySQL이 점유 → 3307로 노출. 앱은 내부망 db:3306으로 붙어 무관.
      # 127.0.0.1 바인딩 = 이 PC에서만 접속(외부 인터페이스 노출 차단). GUI는 localhost:3307
      - "127.0.0.1:3307:3306"
    volumes:
      # 스키마는 app 부팅 시 Flyway가 적용 (init-dir 주입 폐지). db는 빈 MySQL로 기동
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-chokchok}
      DB_USER: ${DB_USER:-chokchok}
      DB_PASSWORD: ${DB_PASSWORD:-chokchok}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:5173}
      # 미설정 시 기동 실패(:? 문법) — 소스에 커밋된 dev 시크릿으로 배포되는 사고 차단
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env (min 32 bytes)}
    ports:
      # 127.0.0.1 바인딩 = 외부 인터페이스 노출 차단(db와 동일 패턴).
      # 같은 PC의 FastAPI 컨테이너는 host.docker.internal:8080으로 접속 가능(Docker Desktop)
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db-data:
